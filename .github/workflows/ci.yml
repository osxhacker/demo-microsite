name: Continuous Integration

on:
  pull_request:
    branches: ['**']
  push:
    branches: ['**']

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  JAVA_OPTS: '-Xms2048M -Xmx4096M -Xss2M -XX:ReservedCodeCacheSize=256m -XX:+UseG1GC -server -Dfile.encoding=UTF-8'

jobs:
  build:
    name: Build and Test
    strategy:
      matrix:
        os: [ubuntu-latest]
        scala: [2.13.18]
        java: [temurin@25]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout current branch (full)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java (temurin@25)
        if: matrix.java == 'temurin@25'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Compile project before running tests
        run: sbt '++ ${{ matrix.scala }}' compile

      - name: Check that workflows are up to date
        run: sbt '++ ${{ matrix.scala }}' githubWorkflowCheck

      - name: Build project
        run: sbt '++ ${{ matrix.scala }}' test

      - name: Compress target directories
        run: tar cf targets.tar services/inventory/target services/target frontends/site/target services/storage-facility/target frontends/target frontends/company/target gatling/target frontends/storage-facility/target services/company/target target services/purchase-order/target services/chassis/target api/target project/target

      - name: Upload target directories
        uses: actions/upload-artifact@v4
        with:
          name: target-${{ matrix.os }}-${{ matrix.scala }}-${{ matrix.java }}
          path: targets.tar

  publish:
    name: Publish Artifacts
    needs: [build]
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    strategy:
      matrix:
        os: [ubuntu-latest]
        scala: [2.13.18]
        java: [temurin@25]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout current branch (full)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Java (temurin@25)
        if: matrix.java == 'temurin@25'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 25
          cache: sbt

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Download target directories (2.13.18)
        uses: actions/download-artifact@v4
        with:
          name: target-${{ matrix.os }}-2.13.18-${{ matrix.java }}

      - name: Inflate target directories (2.13.18)
        run: |
          tar xf targets.tar
          rm targets.tar

      - name: Reject attempts to publish snapshots
        run: |
          grep -qi '^\s*thisbuild\s*/\s*version\s*:=.*snapshot' build.sbt

          test $? -ne 0 || {
            echo 'Publishing snapshots is not supported' > /dev/stderr
            exit 1
            }

      - name: Publish project
        run: sbt +publish
